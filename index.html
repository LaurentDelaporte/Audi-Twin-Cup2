<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audi : L'Excellence Technologique</title>
    <style>
        :root {
            --audi-red: #bb0a30;
            --audi-black: #000000;
            --audi-grey: #f0f0f0;
            --success: #28a745;
            --error: #dc3545;
        }

        body {
            font-family: "Audi Type", "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--audi-black);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: #111111;
            padding: 50px;
            width: 95%;
            max-width: 800px;
            border-top: 4px solid var(--audi-red);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            text-align: center;
        }

        #digital-timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3rem;
            color: var(--audi-red);
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        h2 { font-weight: 300; color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; }

        .question { 
            font-size: 1.6rem; 
            margin: 30px 0; 
            font-weight: 300;
            line-height: 1.4;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) { border-color: #fff; }

        button.correct { background-color: var(--success) !important; border-color: var(--success); }
        button.wrong { background-color: var(--error) !important; border-color: var(--error); }

        #explanation-box {
            display: none;
            background: #1a1a1a;
            border-left: 3px solid var(--audi-red);
            padding: 25px;
            text-align: left;
            margin-top: 20px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        #explanation-box b { color: var(--audi-red); text-transform: uppercase; font-size: 0.8rem; }

        #next-btn {
            display: none;
            width: 100%;
            background: var(--audi-red);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 25px;
        }

        #next-btn:hover { background: #9a0828; }

        #score-board { display: none; }
        .hidden { display: none; }

        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-zone">
        <div id="digital-timer">00:30</div>
        <h2 id="q-number">Question 1 / 30</h2>
        <div class="question" id="question-text">Initialisation...</div>
        <div class="options" id="options-container"></div>
        <div id="explanation-box"></div>
        <button id="next-btn" onclick="nextQuestion()">Passer à l'épreuve suivante</button>
    </div>

    <div id="score-board">
        <h1 style="font-weight: 300;">Analyse Terminée</h1>
        <p id="final-score" style="font-size: 2rem; margin: 30px 0;"></p>
        <button onclick="location.reload()" style="border: 1px solid var(--audi-red); width: auto; padding: 15px 40px;">Recommencer</button>
    </div>
</div>

<script>
const questionsData = [
    {
        q: "Lequel de ces pionniers de l'automobile a fondé la manufacture Audi en 1909 ?",
        ops: ["Gottlieb Daimler", "August Horch", "Ferdinand Porsche", "Wilhelm Maybach"],
        ans: "August Horch",
        exp: "<b>Le secret de l'expert :</b> Ayant été évincé de sa première entreprise 'Horch', il ne pouvait plus légalement utiliser son nom. Il choisit donc sa traduction latine. <br><br><b>Moyen mnémotechnique :</b> <i>'Horch'</i> signifie <i>'Écoute'</i> en allemand, ce qui devient <i>'Audi'</i> en latin. Pensez à l'auditif."
    },
    {
        q: "Quelle est la symbolique historique des quatre anneaux entrelacés formant l'emblème d'Audi ?",
        ops: ["Les quatre temps du cycle moteur", "Les quatre éléments fondamentaux", "L'alliance de quatre constructeurs au sein d'Auto Union", "Les quatre victoires consécutives au Mans"],
        ans: "L'alliance de quatre constructeurs au sein d'Auto Union",
        exp: "<b>Le secret de l'expert :</b> Ce logo célèbre la fusion de 1932 entre Audi, DKW, Horch et Wanderer pour survivre à la Grande Dépression.<br><br><b>Moyen mnémotechnique :</b> Visualisez les 4 marques comme 4 anneaux scellant un pacte de force."
    },
    {
        q: "Quelle prouesse l'Audi R10 TDI a-t-elle accomplie lors des 24 Heures du Mans en 2006 ?",
        ops: ["Le record absolu de vitesse en pointe", "La première victoire d'un moteur Diesel", "Une course entière sans aucun ravitaillement", "L'utilisation de bio-carburant de synthèse"],
        ans: "La première victoire d'un moteur Diesel",
        exp: "<b>Le secret de l'expert :</b> Audi a prouvé au monde que le Diesel pouvait allier endurance et performance extrême en compétition.<br><br><b>Moyen mnémotechnique :</b> <b>TDI</b> = <b>T</b>riomphe du <b>D</b>iesel <b>I</b>ncontestable."
    }
    // ... Les 27 autres questions suivent cette structure.
];

let currentIdx = 0;
let score = 0;
let timer;
let timeLeft = 30;
let shuffledQuestions = [];

function initQuiz() {
    shuffledQuestions = questionsData.sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= shuffledQuestions.length) return endGame();
    
    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    timeLeft = 30;
    updateDisplay();

    const data = shuffledQuestions[currentIdx];
    document.getElementById('q-number').innerText = `Question ${currentIdx + 1} / ${shuffledQuestions.length}`;
    document.getElementById('question-text').innerText = data.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    const shuffledOps = [...data.ops].sort(() => Math.random() - 0.5);
    shuffledOps.forEach(op => {
        const btn = document.createElement('button');
        btn.innerText = op;
        btn.onclick = () => checkAnswer(btn, op === data.ans);
        container.appendChild(btn);
    });

    timer = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
            clearInterval(timer);
            checkAnswer(null, false);
        }
    }, 1000);
}

function updateDisplay() {
    const s = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
    document.getElementById('digital-timer').innerText = `00:${s}`;
    document.getElementById('digital-timer').style.color = timeLeft < 10 ? "#ff0000" : "var(--audi-red)";
}

function checkAnswer(selectedBtn, isCorrect) {
    clearInterval(timer);
    const data = shuffledQuestions[currentIdx];
    const buttons = document.querySelectorAll('.options button');

    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === data.ans) btn.classList.add('correct');
    });

    if (isCorrect) {
        score++;
    } else if (selectedBtn) {
        selectedBtn.classList.add('wrong');
    }

    const expBox = document.getElementById('explanation-box');
    expBox.innerHTML = data.exp;
    expBox.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    showQuestion();
}

function endGame() {
    document.getElementById('game-zone').classList.add('hidden');
    document.getElementById('score-board').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / ${shuffledQuestions.length}`;
}

initQuiz();
</script>
</body>
</html>
