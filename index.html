<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Audi : L'Excellence Technologique</title>
    <style>
        :root {
            --audi-red: #bb0a30;
            --audi-black: #000000;
            --success: #28a745;
            --error: #dc3545;
        }

        body {
            font-family: "Audi Type", "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--audi-black);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: #111111;
            padding: 40px;
            width: 95%;
            max-width: 850px;
            border-top: 4px solid var(--audi-red);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            text-align: center;
        }

        #digital-timer {
            font-family: 'Courier New', monospace;
            font-size: 3rem;
            color: var(--audi-red);
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        h2 { font-weight: 300; color: #666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; }

        .question { font-size: 1.5rem; margin: 25px 0; font-weight: 300; line-height: 1.4; font-style: italic; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }

        button {
            background: transparent; border: 1px solid #333; color: #fff;
            padding: 18px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
        }

        button:hover:not(:disabled) { border-color: #fff; background: #1a1a1a; }
        button.correct { background-color: var(--success) !important; border-color: var(--success); }
        button.wrong { background-color: var(--error) !important; border-color: var(--error); }

        #explanation-box {
            display: none; background: #1a1a1a; border-left: 3px solid var(--audi-red);
            padding: 20px; text-align: left; margin-top: 15px; font-size: 1rem;
        }

        #explanation-box b { color: var(--audi-red); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        #next-btn {
            display: none; width: 100%; background: var(--audi-red); color: white;
            border: none; padding: 18px; font-size: 1rem; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 20px;
        }

        #score-board { display: none; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="quiz-container">

        <button onclick="location.reload()" style="border: 1px solid var(--audi-red); cursor:pointer; background:transparent; color:white; padding: 15px 40px;">Recommencer</button>

</div>

        ops: ["+20 mm", "+50 mm", "+80 mm", "Identique"],
        ans: "+80 mm",
        exp: "<b>Note :</b> Cet élargissement massif permettait une stabilité accrue dans les virages rapides du Groupe B.<br><b>Mémo :</b> +80 = Assise de monstre."
    },
    {
        q: "Quel est le dernier modèle Audi à avoir utilisé des poignées de portes 'frigo' (que l'on tire vers le haut) ?",
        ops: ["Audi 80 (B4)", "Audi 100 (C3)", "Audi V8", "Audi Cabriolet"],
        ans: "Audi 100 (C3)",
        exp: "<b>Note :</b> Elles furent remplacées par les poignées à déclenchement horizontal pour des raisons de sécurité en cas de retournement.<br><b>Mémo :</b> C3 = La fin des poignées frigo."
    }
];

let currentIdx = 0;
let score = 0;
let timer;
let timeLeft = 30;
let shuffledQuestions = [];

function initQuiz() {
    shuffledQuestions = questionsData.sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= 30) return endGame();
    
    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    const counterElement = document.getElementById('question-counter'); // Vérifie l'ID dans ton HTML
    if (counterElement) {
        counterElement.innerText = `${currentIdx + 1} / 30`;
    
    
    timeLeft = 30;
    updateDisplay();

    const data = shuffledQuestions[currentIdx];
    document.getElementById('q-number').innerText = `Épreuve ${currentIdx + 1} / ${shuffledQuestions.length}`;
    document.getElementById('question-text').innerText = data.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    const shuffledOps = [...data.ops].sort(() => Math.random() - 0.5);
    shuffledOps.forEach(op => {
        const btn = document.createElement('button');
        btn.innerText = op;
        btn.onclick = () => checkAnswer(btn, op === data.ans);
        container.appendChild(btn);
    });

    timer = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
            clearInterval(timer);
            checkAnswer(null, false);
        }
    }, 1000);
}

function updateDisplay() {
    const s = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
    document.getElementById('digital-timer').innerText = `00:${s}`;
    document.getElementById('digital-timer').style.color = timeLeft < 10 ? "#ff0000" : "var(--audi-red)";
}

function checkAnswer(selectedBtn, isCorrect) {
    clearInterval(timer);
    const data = shuffledQuestions[currentIdx];
    const buttons = document.querySelectorAll('.options button');

    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === data.ans) btn.classList.add('correct');
    });

    if (isCorrect) {
        score++;
    } else if (selectedBtn) {
        selectedBtn.classList.add('wrong');
    }

    const expBox = document.getElementById('explanation-box');
    expBox.innerHTML = data.exp;
    expBox.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    showQuestion();
}

function endGame() {
    document.getElementById('game-zone').classList.add('hidden');
    document.getElementById('score-board').style.display = 'block';
    document.getElementById('final-score').innerText = `Résultat : ${score} / ${shuffledQuestions.length}`;
}

initQuiz();
</script>
</body>
</html>
