let selectedQuestions = [];
let currentIdx = 0;
let score = 0;
let timeLeft = 30;
let timerId = null;

// FONCTION MANQUANTE : Mélangeur aléatoire
function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

function initQuiz() {
    const pool = shuffle([...questionsData]);
    selectedQuestions = pool.slice(0, Math.min(pool.length, 30));
    loadQuestion();
}

function startTimer() {
    clearInterval(timerId);
    timeLeft = 30;
    document.getElementById('timer').innerText = timeLeft;
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timerId);
            checkAnswer(null);
        }
    }, 1000);
}

function loadQuestion() {
    const q = selectedQuestions[currentIdx];
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('q-number').innerText = `QUESTION ${currentIdx + 1}/${selectedQuestions.length}`;
    document.getElementById('progress').style.width = `${((currentIdx) / selectedQuestions.length) * 100}%`;
    document.getElementById('q-text').innerText = q.q;

    const optCont = document.getElementById('options');
    optCont.innerHTML = '';
    // Mélange des options pour chaque question
    shuffle([...q.o]).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optCont.appendChild(btn);
    });
    
    startTimer();
}

function checkAnswer(selected) {
    clearInterval(timerId);
    const q = selectedQuestions[currentIdx];
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => {
        b.disabled = true;
        if(b.innerText === q.a) b.classList.add('correct');
        else if(selected !== null && b.innerText === selected) b.classList.add('wrong');
    });
    
    if(selected === q.a) score++;
    document.getElementById('result-title').innerText = (selected === q.a) ? "SUCCÈS" : "ERREUR";
    document.getElementById('rationale').innerText = q.r;
    document.getElementById('feedback').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < selectedQuestions.length) loadQuestion();
    else {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('final-score').innerHTML = `Score Final : <strong>${score}/${selectedQuestions.length}</strong>`;
    }
}

window.onload = initQuiz;
