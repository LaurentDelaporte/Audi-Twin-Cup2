<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audi Ultimate Quiz - Vorsprung durch Technik</title>
    <style>
        :root {
            --audi-red: #bb0a30;
            --audi-black: #1a1a1a;
            --audi-grey: #f0f0f0;
            --success: #28a745;
            --error: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--audi-black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #quiz-container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            text-align: center;
            border-top: 5px solid var(--audi-red);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: var(--audi-grey); }
        
        #timer-bar {
            width: 100%;
            height: 8px;
            background: #444;
            margin-bottom: 20px;
            border-radius: 4px;
            overflow: hidden;
        }

        #timer-progress {
            width: 100%;
            height: 100%;
            background: var(--audi-red);
            transition: width 1s linear;
        }

        .question { font-size: 1.2rem; margin-bottom: 25px; min-height: 60px; }

        .options {
            display: grid;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid #555;
            color: white;
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) { background: #3d3d3d; border-color: var(--audi-red); }

        button.correct { background-color: var(--success) !important; border-color: var(--success); }
        button.wrong { background-color: var(--error) !important; border-color: var(--error); }
        
        #score-board { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-zone">
        <h1 id="q-number">Question 1/30</h1>
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <div class="question" id="question-text">Chargement...</div>
        <div class="options" id="options-container">
            </div>
    </div>

    <div id="score-board">
        <h2>Félicitations !</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()" style="background: var(--audi-red); border: none;">Recommencer</button>
    </div>
</div>

<script>
const questionsData = [
    {q: "Qui est le fondateur de la marque Audi en 1909 ?", ops: ["Gottlieb Daimler", "August Horch", "Ferdinand Porsche", "Wilhelm Maybach"], ans: "August Horch"},
    {q: "Que signifie le nom « Audi » en latin ?", ops: ["La vitesse", "Quatre", "Écoute", "Toujours devant"], ans: "Écoute"},
    {q: "Que représentent les quatre anneaux du logo Audi ?", ops: ["Étapes de combustion", "Quatre éléments", "Fusion de quatre marques", "Victoires au Mans"], ans: "Fusion de quatre marques"},
    {q: "Où se situe le siège social historique ?", ops: ["Stuttgart", "Munich", "Wolfsburg", "Ingolstadt"], ans: "Ingolstadt"},
    {q: "Quelle marque n'était pas dans l'Auto Union ?", ops: ["DKW", "Wanderer", "BMW", "Horch"], ans: "BMW"},
    {q: "Année de relance par Volkswagen ?", ops: ["1945", "1965", "1972", "1980"], ans: "1965"},
    {q: "Slogan emblématique de la marque ?", ops: ["Das Auto", "Vorsprung durch Technik", "Sheer Driving Pleasure", "The Best or Nothing"], ans: "Vorsprung durch Technik"},
    {q: "Nom de la transmission intégrale ?", ops: ["4Matic", "xDrive", "Quattro", "Allroad"], ans: "Quattro"},
    {q: "Innovation A8 (1994) ?", ops: ["Châssis carbone", "Audi Space Frame (Alu)", "Peinture auto", "Portes papillon"], ans: "Audi Space Frame (Alu)"},
    {q: "Gamme 100% électrique ?", ops: ["g-tron", "h-tron", "e-tron", "i-Performance"], ans: "e-tron"},
    {q: "Technologie d'éclairage pionnière ?", ops: ["Xénon", "Matrix LED", "Acétylène", "Lasers"], ans: "Matrix LED"},
    {q: "Signification de « TFSI » ?", ops: ["Turbo Fuel Stratified Injection", "Total Fuel Speed", "Turbo Flow System", "Twin Fuel"], ans: "Turbo Fuel Stratified Injection"},
    {q: "Groupe de rallye de la Quattro ?", ops: ["Groupe A", "Groupe B", "WRC Plus", "Groupe 4"], ans: "Groupe B"},
    {q: "Pilote française sur Quattro ?", ops: ["M-C Beaumont", "Michèle Mouton", "Anne Baverey", "I. Patissier"], ans: "Michèle Mouton"},
    {q: "Victoires d'Audi au Mans ?", ops: ["9", "13", "19", "7"], ans: "13"},
    {q: "R10 TDI au Mans (2006) ?", ops: ["Moteur rotatif", "Premier Diesel vainqueur", "Autonome", "Pneus sans air"], ans: "Premier Diesel vainqueur"},
    {q: "Recordman victoires Mans (Audi) ?", ops: ["Jacky Ickx", "H. Pescarolo", "Tom Kristensen", "Allan McNish"], ans: "Tom Kristensen"},
    {q: "Championnat tourisme dominé ?", ops: ["WTCC", "DTM", "BTCC", "Nascar"], ans: "DTM"},
    {q: "Année d'entrée officielle F1 ?", ops: ["2024", "2026", "2025", "2028"], ans: "2026"},
    {q: "Écurie support F1 ?", ops: ["Williams", "Sauber", "McLaren", "Haas"], ans: "Sauber"},
    {q: "Directeur projet F1 (ex-McLaren) ?", ops: ["Mattia Binotto", "Andreas Seidl", "F. Vasseur", "C. Horner"], ans: "Andreas Seidl"},
    {q: "Pourquoi 2026 en F1 ?", ops: ["120 ans", "Nouveau règlement moteur", "Départ Mercedes", "Lambo"], ans: "Nouveau règlement moteur"},
    {q: "Ingénieur du système Quattro ?", ops: ["Ferdinand Piëch", "Herbert Diess", "M. Winterkorn", "B. Pischetsrieder"], ans: "Ferdinand Piëch"},
    {q: "Supercar ADN Gallardo ?", ops: ["RS6", "TT RS", "R8", "RS7"], ans: "R8"},
    {q: "Modèle design 1998 ?", ops: ["A2", "TT", "A4", "Q7"], ans: "TT"},
    {q: "Designer de l'Audi A5 ?", ops: ["Peter Schreyer", "Chris Bangle", "Walter de Silva", "Marc Lichte"], ans: "Walter de Silva"},
    {q: "Branche modèles RS ?", ops: ["Motorsport", "Audi Sport GmbH", "Exclusive", "Engineering"], ans: "Audi Sport GmbH"},
    {q: "Ancêtre RS avec Porsche ?", ops: ["RS3", "RS2 Avant", "80 Quattro", "V8"], ans: "RS2 Avant"},
    {q: "Ambassadeur F1/Électrique ?", ops: ["Vettel", "Nico Hülkenberg", "C. Sainz", "M. Ekström"], ans: "Nico Hülkenberg"},
    {q: "Concept futur autonome ?", ops: ["AI:CON", "Avus", "Rosemeyer", "Nanuk"], ans: "AI:CON"}
];

let currentIdx = 0;
let score = 0;
let timer;
let timeLeft = 30;
let shuffledQuestions = [];

function initQuiz() {
    shuffledQuestions = questionsData.sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= shuffledQuestions.length) return endGame();
    
    timeLeft = 30;
    updateTimerBar();
    
    const data = shuffledQuestions[currentIdx];
    document.getElementById('q-number').innerText = `Question ${currentIdx + 1}/30`;
    document.getElementById('question-text').innerText = data.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    const shuffledOps = [...data.ops].sort(() => Math.random() - 0.5);
    
    shuffledOps.forEach(op => {
        const btn = document.createElement('button');
        btn.innerText = op;
        btn.onclick = () => checkAnswer(btn, op === data.ans);
        container.appendChild(btn);
    });

    timer = setInterval(() => {
        timeLeft--;
        updateTimerBar();
        if (timeLeft <= 0) {
            clearInterval(timer);
            checkAnswer(null, false);
        }
    }, 1000);
}

function updateTimerBar() {
    const bar = document.getElementById('timer-progress');
    bar.style.width = (timeLeft / 30 * 100) + "%";
}

function checkAnswer(selectedBtn, isCorrect) {
    clearInterval(timer);
    const buttons = document.querySelectorAll('.options button');
    const correctAns = shuffledQuestions[currentIdx].ans;

    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correctAns) btn.classList.add('correct');
    });

    if (isCorrect) {
        score++;
    } else if (selectedBtn) {
        selectedBtn.classList.add('wrong');
    }

    currentIdx++;
    setTimeout(showQuestion, 2000);
}

function endGame() {
    document.getElementById('game-zone').classList.add('hidden');
    document.getElementById('score-board').style.display = 'block';
    document.getElementById('final-score').innerText = `Votre score : ${score} / 30`;
}

initQuiz();
</script>

</body>
</html>
