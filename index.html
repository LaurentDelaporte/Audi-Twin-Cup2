<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audi : Le Quiz de l'Excellence</title>
    <style>
        :root {
            --audi-red: #bb0a30;
            --audi-black: #000000;
            --audi-dark-grey: #1a1a1a;
            --success: #28a745;
            --error: #dc3545;
            --text-gold: #d4af37;
        }

        body {
            font-family: 'Optima', 'Segoe UI', serif;
            background-color: var(--audi-black);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: var(--audi-dark-grey);
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 95%;
            max-width: 800px;
            text-align: center;
            border-left: 4px solid var(--audi-red);
            position: relative;
        }

        /* Style du Chronomètre Digital */
        #digital-timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            color: var(--audi-red);
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(187, 10, 48, 0.5);
        }

        #timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 5px;
        }

        h1 { font-weight: 300; letter-spacing: 2px; color: var(--text-gold); margin-bottom: 30px; }
        
        #timer-container {
            width: 100%;
            height: 4px;
            background: #333;
            margin-bottom: 30px;
        }

        #timer-progress {
            width: 100%;
            height: 100%;
            background: var(--audi-red);
            transition: width 1s linear;
        }

        .question { 
            font-size: 1.4rem; 
            margin-bottom: 40px; 
            line-height: 1.6;
            font-style: italic;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        button:hover:not(:disabled) { 
            border-color: var(--audi-red); 
            color: #fff;
            background: #2a2a2a;
        }

        button.correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        button.wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        
        #score-board { display: none; }
        .hidden { display: none; }

        @media (max-width: 600px) {
            .options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-zone">
        <h1 id="q-number">Question 1 / 30</h1>
        
        <div id="timer-label">Temps restant</div>
        <div id="digital-timer">00:30</div>
        
        <div id="timer-container"><div id="timer-progress"></div></div>
        
        <div class="question" id="question-text">Initialisation du protocole...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="score-board">
        <h1>Analyse des Résultats</h1>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <button onclick="location.reload()" style="margin-top:20px; border: 1px solid var(--audi-red);">Recommencer l'épreuve</button>
    </div>
</div>

<script>
// Les questions conservent leur français exemplaire
const questionsData = [
    {q: "Lequel de ces pionniers de l'automobile a fondé la manufacture Audi en 1909 ?", ops: ["Gottlieb Daimler", "August Horch", "Ferdinand Porsche", "Wilhelm Maybach"], ans: "August Horch"},
    {q: "Quelle est la signification exacte du terme latin « Audi », choisi par le fondateur pour nommer sa marque ?", ops: ["Le dépassement de soi", "L'union des forces", "L'impératif du verbe écouter", "La célérité du mouvement"], ans: "L'impératif du verbe écouter"},
    {q: "Quelle est la symbolique historique des quatre anneaux entrelacés formant l'emblème d'Audi ?", ops: ["Les quatre temps du cycle moteur", "Les quatre éléments fondamentaux", "L'alliance de quatre constructeurs au sein d'Auto Union", "Les quatre victoires consécutives au Mans"], ans: "L'alliance de quatre constructeurs au sein d'Auto Union"},
    {q: "Dans quelle cité de Bavière se situe le siège social historique et le cœur industriel de la marque ?", ops: ["Stuttgart", "Munich", "Wolfsburg", "Ingolstadt"], ans: "Ingolstadt"},
    {q: "Parmi les marques suivantes, laquelle ne faisait point partie de l'Union initiale de 1932 ?", ops: ["DKW", "Wanderer", "BMW", "Horch"], ans: "BMW"},
    {q: "En quelle année la marque Audi fut-elle officiellement relancée sous l'égide du groupe Volkswagen ?", ops: ["1945", "1965", "1972", "1980"], ans: "1965"},
    {q: "Quel est le célèbre slogan allemand exprimant la philosophie d'innovation technologique de la marque ?", ops: ["Das Auto", "Vorsprung durch Technik", "Sheer Driving Pleasure", "The Best or Nothing"], ans: "Vorsprung durch Technik"},
    {q: "Sous quel nom est désignée la célèbre technologie de transmission intégrale permanente développée par Audi ?", ops: ["4Matic", "xDrive", "Quattro", "Allroad"], ans: "Quattro"},
    {q: "Quelle innovation structurelle majeure Audi a-t-elle introduite sur la berline A8 dès l'année 1994 ?", ops: ["Le châssis monocoque en carbone", "La structure intégrale en aluminium (Audi Space Frame)", "La peinture à haute résistance thermique", "Les portières à ouverture élytre"], ans: "La structure intégrale en aluminium (Audi Space Frame)"},
    {q: "Quelle appellation spécifique désigne la nouvelle génération de véhicules à propulsion intégralement électrique ?", ops: ["La gamme g-tron", "La gamme h-tron", "La gamme e-tron", "L'entité i-Performance"], ans: "La gamme e-tron"},
    {q: "Quelle technologie d'éclairage d'avant-garde Audi fut-elle le premier constructeur à proposer en grande série ?", ops: ["Les optiques au xénon haute intensité", "Les projecteurs Matrix LED", "Les feux à combustion d'acétylène", "Les faisceaux lasers directionnels"], ans: "Les projecteurs Matrix LED"},
    {q: "Quelle est la signification technique de l'acronyme « TFSI » appliqué aux motorisations du groupe ?", ops: ["Turbo Fuel Stratified Injection", "Total Fuel Speed Induction", "Turbo Flow System Intake", "Twin Fuel Supercharged"], ans: "Turbo Fuel Stratified Injection"},
    {q: "Dans quelle catégorie de rallye l'Audi Quattro a-t-elle imposé sa suprématie durant les années 1980 ?", ops: ["La catégorie Groupe A", "La légendaire catégorie Groupe B", "Le championnat WRC Plus", "La catégorie Groupe 4"], ans: "La légendaire catégorie Groupe B"},
    {q: "Quelle pilote française d'exception a marqué l'histoire du rallye mondial au volant d'une Audi Quattro ?", ops: ["Marie-Claude Beaumont", "Michèle Mouton", "Anne Baverey", "Isabelle Patissier"], ans: "Michèle Mouton"},
    {q: "Quel est le nombre total de victoires remportées par Audi lors de l'épreuve mythique des 24 Heures du Mans ?", ops: ["Neuf victoires", "Treize victoires", "Dix-neuf victoires", "Sept victoires"], ans: "Treize victoires"},
    {q: "Quelle prouesse l'Audi R10 TDI a-t-elle accomplie lors des 24 Heures du Mans en 2006 ?", ops: ["L'utilisation d'un moteur à cycle rotatif", "La première victoire d'un moteur Diesel en endurance", "L'achèvement de la course en mode autonome", "L'usage de pneumatiques sans air"], ans: "La première victoire d'un moteur Diesel en endurance"},
    {q: "Quel pilote de légende détient le record de victoires au Mans, acquises pour la plupart avec l'écurie Audi ?", ops: ["Jacky Ickx", "Henri Pescarolo", "Tom Kristensen", "Allan McNish"], ans: "Tom Kristensen"},
    {q: "Dans quel championnat de voitures de tourisme la marque Audi s'illustre-t-elle particulièrement en Allemagne ?", ops: ["Le championnat WTCC", "Le championnat DTM", "Le championnat BTCC", "La série Nascar"], ans: "Le championnat DTM"},
    {q: "En quelle année la firme d'Ingolstadt a-t-elle officialisé son futur engagement au sein de la Formule 1 ?", ops: ["2024", "2026", "2025", "2028"], ans: "2026"},
    {q: "Sur quelle structure d'écurie existante Audi s'appuie-t-elle pour concrétiser son arrivée dans l'élite du sport automobile ?", ops: ["L'écurie Williams", "L'écurie Sauber", "L'écurie McLaren", "L'écurie Haas"], ans: "L'écurie Sauber"},
    {q: "Quel dirigeant d'expérience a été nommé pour prendre la tête du prestigieux projet de Formule 1 chez Audi ?", ops: ["Mattia Binotto", "Andreas Seidl", "Frédéric Vasseur", "Christian Horner"], ans: "Andreas Seidl"},
    {q: "Quelle est la raison principale ayant motivé l'entrée d'Audi en Formule 1 pour la saison 2026 ?", ops: ["La célébration de son centenaire", "L'instauration d'une nouvelle réglementation sur les carburants durables", "Le retrait annoncé de la marque Mercedes-Benz", "La volonté de remplacer la firme Lamborghini"], ans: "L'instauration d'une nouvelle réglementation sur les carburants durables"},
    {q: "Quel ingénieur visionnaire, ancien dirigeant du groupe, imposa le système Quattro et le moteur à cinq cylindres ?", ops: ["Ferdinand Piëch", "Herbert Diess", "Martin Winterkorn", "Bernd Pischetsrieder"], ans: "Ferdinand Piëch"},
    {q: "Quelle voiture d'exception partage sa plateforme et son moteur V10 avec la Lamborghini Huracán ?", ops: ["L'Audi RS6 Avant", "L'Audi TT RS", "L'Audi R8", "L'Audi RS7 Sportback"], ans: "L'Audi R8"},
    {q: "Quel modèle au design iconique, présenté en 1998, a profondément renouvelé l'identité visuelle d'Audi ?", ops: ["L'Audi A2", "L'Audi TT", "L'Audi A4", "L'Audi Q7"], ans: "L'Audi TT"},
    {q: "Lequel de ces designers renommés est le créateur de l'Audi A5, qu'il considère comme son chef-d'œuvre ?", ops: ["Peter Schreyer", "Chris Bangle", "Walter de Silva", "Marc Lichte"], ans: "Walter de Silva"},
    {q: "Quelle entité au sein de l'entreprise est dédiée à la conception des modèles de très haute performance siglés « RS » ?", ops: ["Audi Motorsport", "Audi Sport GmbH", "Audi Exclusive", "Audi Engineering"], ans: "Audi Sport GmbH"},
    {q: "Quel véhicule mythique, codéveloppé avec Porsche, fut le premier à porter le badge RS au début des années 1990 ?", ops: ["L'Audi RS3 Sportback", "L'Audi RS2 Avant", "L'Audi 80 Quattro", "L'Audi V8 DTM"], ans: "L'Audi RS2 Avant"},
    {q: "Quel pilote allemand de renom a été désigné ambassadeur pour le futur projet Formule 1 de la marque ?", ops: ["Sebastian Vettel", "Nico Hülkenberg", "Carlos Sainz Senior", "Mattias Ekström"], ans: "Nico Hülkenberg"},
    {q: "Quel concept-car préfigure la vision d'Audi concernant le futur de la mobilité de luxe et de la conduite autonome ?", ops: ["L'Audi AI:CON", "L'Audi Avus Quattro", "L'Audi Rosemeyer", "L'Audi Nanuk"], ans: "L'Audi AI:CON"}
];

let currentIdx = 0;
let score = 0;
let timer;
let timeLeft = 30;
let shuffledQuestions = [];

function initQuiz() {
    shuffledQuestions = questionsData.sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= shuffledQuestions.length) return endGame();
    
    timeLeft = 30;
    updateDisplay();
    
    const data = shuffledQuestions[currentIdx];
    document.getElementById('q-number').innerText = `Épreuve ${currentIdx + 1} / 30`;
    document.getElementById('question-text').innerText = data.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    // Brassage des options pour éviter que la réponse soit toujours à la même position
    const shuffledOps = [...data.ops].sort(() => Math.random() - 0.5);
    
    shuffledOps.forEach(op => {
        const btn = document.createElement('button');
        btn.innerText = op;
        btn.onclick = () => checkAnswer(btn, op === data.ans);
        container.appendChild(btn);
    });

    timer = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
            clearInterval(timer);
            checkAnswer(null, false);
        }
    }, 1000);
}

function updateDisplay() {
    // Mise à jour de la barre
    const bar = document.getElementById('timer-progress');
    bar.style.width = (timeLeft / 30 * 100) + "%";
    
    // Mise à jour du chrono digital
    const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
    document.getElementById('digital-timer').innerText = `00:${seconds}`;
    
    // Effet d'urgence quand il reste moins de 10 secondes
    if (timeLeft < 10) {
        document.getElementById('digital-timer').style.color = "#ff0000";
    } else {
        document.getElementById('digital-timer').style.color = "var(--audi-red)";
    }
}

function checkAnswer(selectedBtn, isCorrect) {
    clearInterval(timer);
    const buttons = document.querySelectorAll('.options button');
    const correctAns = shuffledQuestions[currentIdx].ans;

    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correctAns) btn.classList.add('correct');
    });

    if (isCorrect) {
        score++;
    } else if (selectedBtn) {
        selectedBtn.classList.add('wrong');
    }

    currentIdx++;
    setTimeout(showQuestion, 2500);
}

function endGame() {
    document.getElementById('game-zone').classList.add('hidden');
    document.getElementById('score-board').style.display = 'block';
    document.getElementById('final-score').innerText = `Votre score final s'établit à ${score} sur 30 points.`;
}

initQuiz();
</script>

</body>
</html>
